server {
    listen 80;
    root /var/www/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/html text/css application/javascript application/json application/geo+json image/svg+xml;
    gzip_comp_level 6;

    # Static assets — long cache, serve pre-compressed
    location ~* \.(js|css|png|json)$ {
        gzip_static on;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /data/ {
        proxy_pass http://skylink-core-staging:19180/data/;
    }

    location /re-api/ {
        proxy_pass http://skylink-core-staging:19180/re-api/;
    }

    location /mcp/ {
        proxy_pass http://skylink-core-staging:19180/mcp/;
    }

    location /ws {
        proxy_pass http://skylink-core-staging:19180/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /stats {
        proxy_pass http://skylink-core-staging:19180/stats;
    }

    location /.well-known/ {
        proxy_pass http://skylink-core-staging:19180/.well-known/;
    }
}
