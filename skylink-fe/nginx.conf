server {
    listen 80;
    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /data/ {
        proxy_pass http://skylink-core-staging:19180/data/;
    }

    location /re-api/ {
        proxy_pass http://skylink-core-staging:19180/re-api/;
    }

    location /mcp/ {
        proxy_pass http://skylink-core-staging:19180/mcp/;
    }

    location /ws {
        proxy_pass http://skylink-core-staging:19180/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /stats {
        proxy_pass http://skylink-core-staging:19180/stats;
    }

    location /.well-known/ {
        proxy_pass http://skylink-core-staging:19180/.well-known/;
    }
}
