<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skylink Tracker</title>
<script src="https://unpkg.com/maplibre-gl@5.11.0/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@5.11.0/dist/maplibre-gl.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{height:100%;background:#0a0a0f;font-family:system-ui,sans-serif;color:#e0e0e0}
#map{position:absolute;top:0;left:0;right:0;bottom:0}
#stats{position:absolute;top:10px;left:10px;background:rgba(10,10,20,0.85);backdrop-filter:blur(12px);
  padding:8px 14px;border-radius:8px;font-size:12px;z-index:10;border:1px solid rgba(255,255,255,0.08)}
#stats span{color:#4fc3f7;font-weight:700;font-variant-numeric:tabular-nums}
#panel{position:absolute;top:10px;right:10px;width:300px;background:rgba(10,10,20,0.9);backdrop-filter:blur(16px);
  padding:16px;border-radius:10px;z-index:10;display:none;border:1px solid rgba(255,255,255,0.08);font-size:13px}
#panel h3{margin:0 0 8px;color:#4fc3f7;font-size:15px}
#panel .row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
#panel .label{color:#888}
#panel .value{color:#e0e0e0;font-variant-numeric:tabular-nums}
#panel .close{position:absolute;top:8px;right:12px;cursor:pointer;color:#888;font-size:18px}
.maplibregl-popup-content{background:rgba(10,10,20,0.9)!important;color:#e0e0e0!important;
  border:1px solid rgba(255,255,255,0.1)!important;border-radius:6px!important;padding:6px 10px!important;font-size:12px}
.maplibregl-popup-tip{border-top-color:rgba(10,10,20,0.9)!important}
</style>
</head>
<body>
<div id="map"></div>
<div id="stats">Aircraft: <span id="ac-count">0</span> | With pos: <span id="ac-pos">0</span></div>
<div id="panel">
  <div class="close" onclick="document.getElementById('panel').style.display='none'">&times;</div>
  <h3 id="p-callsign">—</h3>
  <div id="p-body"></div>
</div>

<script>
const API = window.location.origin;
const REFRESH = 1500;

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  center: [10, 30],
  zoom: 3,
  attributionControl: false,
});

map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

map.on('load', () => {
  // Load aircraft icon as SDF
  map.loadImage(API + '/sprite.png', (err, img) => {
    if (err) { console.error(err); return; }
    map.addImage('aircraft', img, { sdf: true });

    // GeoJSON source with clustering
    map.addSource('aircraft', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [] },
      cluster: true,
      clusterMaxZoom: 7,
      clusterRadius: 50,
    });

    // Cluster circles
    map.addLayer({
      id: 'clusters', type: 'circle', source: 'aircraft', filter: ['has', 'point_count'],
      paint: {
        'circle-color': ['step', ['get', 'point_count'], '#4fc3f7', 50, '#29b6f6', 200, '#0288d1'],
        'circle-radius': ['step', ['get', 'point_count'], 14, 50, 20, 200, 26],
        'circle-opacity': 0.85,
      }
    });

    // Cluster count labels
    map.addLayer({
      id: 'cluster-count', type: 'symbol', source: 'aircraft', filter: ['has', 'point_count'],
      layout: { 'text-field': '{point_count_abbreviated}', 'text-size': 11 },
      paint: { 'text-color': '#fff' }
    });

    // Individual aircraft icons
    map.addLayer({
      id: 'aircraft-icons', type: 'symbol', source: 'aircraft',
      filter: ['!', ['has', 'point_count']],
      layout: {
        'icon-image': 'aircraft',
        'icon-size': ['interpolate', ['linear'], ['zoom'], 3, 0.4, 12, 0.9],
        'icon-rotate': ['coalesce', ['get', 'track'], 0],
        'icon-rotation-alignment': 'map',
        'icon-allow-overlap': true,
        'text-field': ['step', ['zoom'], '', 9, ['get', 'flight']],
        'text-size': 10,
        'text-offset': [0, 1.4],
        'text-optional': true,
      },
      paint: {
        'icon-color': ['interpolate', ['linear'], ['coalesce', ['get', 'alt_baro'], 0],
          0, '#00e676', 10000, '#ffeb3b', 25000, '#ff9800', 40000, '#f44336', 50000, '#e040fb'],
        'text-color': '#ccc',
        'text-halo-color': '#000',
        'text-halo-width': 1,
      }
    });

    // Click on aircraft
    map.on('click', 'aircraft-icons', (e) => {
      const p = e.features[0].properties;
      showPanel(p);
    });

    // Click on cluster → zoom in
    map.on('click', 'clusters', (e) => {
      const f = e.features[0];
      map.getSource('aircraft').getClusterExpansionZoom(f.properties.cluster_id, (err, zoom) => {
        if (!err) map.easeTo({ center: f.geometry.coordinates, zoom: zoom + 1 });
      });
    });

    // Cursor
    map.on('mouseenter', 'aircraft-icons', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'aircraft-icons', () => map.getCanvas().style.cursor = '');
    map.on('mouseenter', 'clusters', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'clusters', () => map.getCanvas().style.cursor = '');

    // Start data refresh
    fetchData();
    setInterval(fetchData, REFRESH);
  });
});

async function fetchData() {
  try {
    const res = await fetch(API + '/data/aircraft.geojson');
    if (!res.ok) return;
    const data = await res.json();
    map.getSource('aircraft')?.setData(data);

    const total = data.features.length;
    document.getElementById('ac-count').textContent = total;
    document.getElementById('ac-pos').textContent = total;
  } catch (e) { console.error('fetch:', e); }
}

function showPanel(p) {
  const panel = document.getElementById('panel');
  document.getElementById('p-callsign').textContent = p.flight || p.hex;
  const rows = [
    ['ICAO', p.hex],
    ['Callsign', p.flight || '—'],
    ['Altitude', p.alt_baro ? p.alt_baro + ' ft' : '—'],
    ['Speed', p.gs ? p.gs + ' kt' : '—'],
    ['Track', p.track ? p.track + '°' : '—'],
    ['Squawk', p.squawk || '—'],
    ['Category', p.category || '—'],
    ['Type', p.type || '—'],
    ['Messages', p.messages],
  ];
  document.getElementById('p-body').innerHTML = rows
    .map(([l, v]) => `<div class="row"><span class="label">${l}</span><span class="value">${v}</span></div>`)
    .join('');
  panel.style.display = 'block';
}
</script>
</body>
</html>
