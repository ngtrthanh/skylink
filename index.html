<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Shape Lab - Random Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap');

        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #ff2d75;
            --dark: #0a1128;
            --light: #e8f1f2;
            --success: #2ecc71;
            --warning: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--dark);
            color: var(--light);
            overflow-x: hidden;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
            letter-spacing: 1px;
        }

        .tagline {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 0.3rem;
            letter-spacing: 0.5px;
        }

        .controls {
            display: flex;
            gap: 0.8rem;
        }

        .control-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }

        .control-btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--dark);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }

        .control-btn-secondary {
            border: 1px solid var(--primary);
            color: var(--primary);
            background: rgba(0, 242, 254, 0.1);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 15px rgba(0, 242, 254, 0.4);
        }

        /* Shape Grid */
        .shape-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
        }

        .shape-container {
            position: relative;
            background: rgba(10, 17, 40, 0.7);
            border-radius: 8px;
            border: 1px solid rgba(0, 242, 254, 0.15);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 120px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            overflow: hidden;
            padding: 10px;
        }

        .shape-container:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.15);
            border-color: rgba(0, 242, 254, 0.3);
        }

        .shape-name {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 11px;
            background: rgba(0, 242, 254, 0.1);
            padding: 6px 0;
            border-radius: 0 0 8px 8px;
            border-top: 1px solid rgba(0, 242, 254, 0.15);
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        svg {
            max-width: 80%;
            max-height: 80%;
            filter: drop-shadow(0 0 3px rgba(0, 242, 254, 0.2));
        }

        /* Status Bar */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 0.5rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-top: 1px solid rgba(0, 242, 254, 0.1);
            font-size: 0.8rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .controls {
                width: 100%;
                justify-content: center;
                margin-top: 0.5rem;
            }

            .shape-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }

            .shape-container {
                height: 100px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-shapes"></i>
                </div>
                <div>
                    <div class="logo-text">SVG SHAPE LAB</div>
                    <div class="tagline">Random SVG shape generator</div>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn control-btn-primary" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
                <button class="control-btn control-btn-secondary" id="exportBtn">
                    <i class="fas fa-download"></i> Export
                </button>
            </div>
        </header>

        <main>
            <div id="shapeGrid" class="shape-grid"></div>
        </main>
    </div>

    <div class="status-bar">
        <div class="status-item">
            <div class="status-indicator"></div>
            <span>Generator Status: Operational</span>
        </div>
        <div class="status-item">
            <i class="fas fa-shapes"></i>
            <span id="shapeCount">0 Shapes Generated</span>
        </div>
        <div class="status-item">
            <i class="fas fa-palette"></i>
            <span>Random Color Mode: Active</span>
        </div>
    </div>

    <script type="module">


        import { shapes } from './icondb/shapes.js';

        function generateRandomColor() {
            const hue = Math.floor(Math.random() * 360);
            return `hsl(${hue}, 80%, 60%)`;
        }

        function svgShapeToSVG(shape, fillColor, strokeColor, strokeWidth, scale) {
            if (!shape) {
                console.error('Shape object is undefined or null.');
                return '';
            }

            scale = scale || 1;
            strokeWidth *= (shape.strokeScale || 1);

            const wi = shape.w * scale;
            const he = shape.h * scale;

            let svg = `<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="${shape.viewBox}" width="${wi}" height="${he}">`;

            if (shape.path) {
                svg += `<path paint-order="stroke" fill="${fillColor}" stroke="${strokeColor}" stroke-width="${2 * strokeWidth}" d="${shape.path}"/>`;
            }

            svg += '</svg>';
            return svg;
        }

        function renderShapes() {
            const shapeGrid = document.getElementById("shapeGrid");
            shapeGrid.innerHTML = '';

            let count = 0;

            Object.entries(shapes).forEach(([shapeName, shape]) => {
                const container = document.createElement('div');
                container.className = 'shape-container';
                container.innerHTML = `
                    ${svgShapeToSVG(shape, generateRandomColor(), '#ffffff', 0.1, 2)}
                    <div class="shape-name">${shapeName}</div>
                `;
                shapeGrid.appendChild(container);
                count++;
            });

            document.getElementById('shapeCount').textContent = `${count} Shapes Generated`;
        }

        function exportShapes() {
            const shapeGrid = document.getElementById("shapeGrid");
            const shapes = shapeGrid.querySelectorAll('.shape-container');

            let svgContent = `<?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
            <svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="1000" height="1000" viewBox="0 0 1000 1000">
                <title>SVG Shape Collection</title>
                <style>
                    .shape-group { 
                        filter: drop-shadow(0 0 3px rgba(0, 242, 254, 0.3));
                    }
                </style>
`;

            // Calculate grid layout for export
            const cols = 4;
            const rows = Math.ceil(shapes.length / cols);
            const cellWidth = 1000 / cols;
            const cellHeight = 1000 / rows;

            shapes.forEach((shape, index) => {
                const svg = shape.querySelector('svg');
                const name = shape.querySelector('.shape-name').textContent;

                if (svg) {
                    const x = (index % cols) * cellWidth + cellWidth / 2;
                    const y = Math.floor(index / cols) * cellHeight + cellHeight / 2;
                    const scale = 0.8 * Math.min(cellWidth, cellHeight) / 100;

                    svgContent += `
                    <g class="shape-group" transform="translate(${x}, ${y}) scale(${scale})">
                        ${svg.innerHTML}
                        <text y="60" text-anchor="middle" font-family="Arial" font-size="12" fill="white">${name}</text>
                    </g>`;
                                }
            });

            svgContent += '\n</svg>';

            // Create download link
            const blob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'svg-shape-collection.svg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Initialize and render shapes
        renderShapes();

        // Add refresh button functionality
        document.getElementById('refreshBtn').addEventListener('click', renderShapes);

        // Add export button functionality
        document.getElementById('exportBtn').addEventListener('click', exportShapes);
    </script>
</body>

</html>
