services:
  skylink-core:
    image: ghcr.io/ngtrthanh/skylink-core:v4.1
    container_name: skylink-core
    command: ["skylink-core", "--ais"]
    restart: unless-stopped
    init: true
    security_opt:
      - apparmor:unconfined
    tmpfs:
      - /tmp
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file: .env
    volumes:
      - skylink-data:/data
    ports:
      - "${API_PORT:-19180}:19180"
      - "${INGEST_PORT:-30004}:${INGEST_PORT:-30004}"
      - "39002:39002"
      - "39003:39003"
      - "39005:39005"
      - "39006:39006"
      - "39047:39047"
      - "10111:10111"
    networks:
      - skynet

  skylink-fe:
    image: nginx:alpine
    container_name: skylink-fe
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./html:/var/www/skylink:ro
    ports:
      - "${FE_PORT:-41080}:80"
    depends_on:
      - skylink-core
    networks:
      - skynet

volumes:
  skylink-data:

networks:
  skynet:
    external: true
