services:
  skylink-core:
    image: skylink-core:v2
    container_name: skylink-core
    restart: unless-stopped
    init: true
    security_opt:
      - apparmor:unconfined
    tmpfs:
      - /tmp
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - RUST_LOG=info
      - BEAST_CONNECT=skylink:30005
      - INGEST_PORT=39004
      - API_PORT=19180
      - BASE_PORT=39000
    ports:
      - "19180:19180"
      - "39002:39002"
      - "39003:39003"
      - "39004:39004"
      - "39005:39005"
      - "39006:39006"
      - "39047:39047"
    networks:
      - skynet

  skylink-test-fe:
    image: nginx:alpine
    container_name: skylink-test-fe
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../ml_clf_fe:/usr/share/nginx/html:ro
    ports:
      - "31790:80"
    depends_on:
      - skylink-core
    networks:
      - skynet

networks:
  skynet:
    external: true
