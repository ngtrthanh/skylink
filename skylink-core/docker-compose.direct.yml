services:
  skylink-core:
    image: skylink-core:v2
    container_name: skylink-core
    restart: unless-stopped
    init: true
    security_opt:
      - apparmor:unconfined
    tmpfs:
      - /tmp
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - RUST_LOG=info
      - INGEST_PORT=30004
      - API_PORT=19180
      - BASE_PORT=30000
    ports:
      - "19180:19180"
      - "30002:30002"
      - "30003:30003"
      - "30004:30004"
      - "30005:30005"
      - "30006:30006"
      - "30047:30047"
    networks:
      - skynet

networks:
  skynet:
    external: true
